# llama-swap example configuration
#
# Copy this file and adjust paths / model files to match your setup.
# Mount your models directory to /models inside the container.
#
# Usage:
#   docker run --gpus all -p 8080:8080 \
#     -v /path/to/models:/models \
#     -v /path/to/config.yaml:/etc/llama-swap/config/config.yaml \
#     <image>

models:
  # ── LLM inference via llama.cpp ──────────────────────────────────────────────
  #
  # Replace /models/your-model.gguf with the actual path inside the container.
  # Adjust --ctx-size and --n-gpu-layers to fit your GPU memory.
  llama:
    cmd: llama-server --port ${PORT} --model /models/your-model.gguf --ctx-size 4096 --n-gpu-layers 99

  # ── Speech transcription via WhisperLive (faster-whisper backend) ────────────
  #
  # Pre-download the model before starting the container, e.g.:
  #   huggingface-cli download Systran/faster-whisper-large-v3 \
  #     --local-dir /models/faster-whisper-large-v3
  # Set --device to cpu if no GPU is available.
  whisper:
    cmd: >-
      /opt/WhisperLive/.venv/bin/python
      /opt/WhisperLive/run_server.py
      --backend faster_whisper
      --faster_whisper_custom_model_path /models/faster-whisper-large-v3
      --enable_rest
      --rest_port ${PORT}

  # ── Speech transcription via Parakeet (ONNX) ─────────────────────────────────
  #
  # Parakeet listens on the fixed port 5092 (hardcoded in app.py).
  # The explicit `proxy` URL is required because ${PORT} injection is not used.
  parakeet:
    cmd: /opt/venv/parakeet/bin/python /opt/parakeet/app.py
    proxy: http://127.0.0.1:5092
    env:
      HF_HOME: /models/.cache/huggingface
